                </>
              )}
              <div className="overflow-hidden max-w-[90vw] max-h-[90vh] flex items-center justify-center"
                   onClick={e => e.stopPropagation()}
                   onMouseDown={onMouseDown}
                   style={{ cursor: imgScale > 1 ? (dragRef.current.dragging ? "grabbing" : "grab") : "default" }}>
                <img src={hotel.images[slide]} alt={`${hotel.name} ${slide+1}`}
                     draggable={false}
                     style={{
                       transform: `scale(${imgScale}) translate(${pan.x / imgScale}px, ${pan.y / imgScale}px)`,
                       transition: dragRef.current.dragging ? "none" : "transform .2s ease",
                       transformOrigin: "center center",
                       userSelect: "none",
                     }}
                     className="max-w-[90vw] max-h-[90vh] object-contain rounded-xl" />
              </div>
              {hotel.images.length > 1 && (
                <div className="absolute bottom-5 left-1/2 -translate-x-1/2 flex gap-2">
                  {hotel.images.map((_,i) => (
                    <button key={i} onClick={e => { e.stopPropagation(); setSlide(i); resetView(); }}
                            className={`w-2 h-2 rounded-full transition-colors ${i===slide?"bg-white":"bg-white/40"}`} />
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Card */}
          <div className="modal-anim relative bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row max-h-[90vh]">
            {/* ── Left: Carousel ── */}
            <div className="relative w-full md:w-[50%] flex-none overflow-hidden bg-surface-container-highest" style={{minHeight:300}}>
              <div className="carousel-track flex h-full" style={{transform:`translateX(-${slide*100}%)`}}>
                {hotel.images.map((src,i) => (
                  <img key={i} src={src} alt={`${hotel.name} ${i+1}`}
                       className="w-full h-full object-cover flex-none" style={{minWidth:"100%"}} />
                ))}
              </div>
              <button onClick={() => setZoomed(true)}
                      className="absolute top-3 right-3 bg-white/80 hover:bg-white p-2 rounded-full shadow-card z-10 transition-colors"
                      title="Phóng to ảnh">
                <Icon name="zoom_in" size={20} />
              </button>
              {hotel.images.length > 1 && (
                <>
                  <button onClick={prev} className="absolute left-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white p-2 rounded-full shadow-card z-10 transition-colors">
                    <Icon name="chevron_left" size={20} />
                  </button>
                  <button onClick={next} className="absolute right-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white p-2 rounded-full shadow-card z-10 transition-colors">
                    <Icon name="chevron_right" size={20} />
                  </button>
                  <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 z-10">
                    {hotel.images.map((_,i) => (
                      <button key={i} onClick={() => setSlide(i)}
                              className={`w-2 h-2 rounded-full transition-colors ${i===slide?"bg-white":"bg-white/40"}`} />
                    ))}
                  </div>
                </>
              )}
            </div>

            {/* ── Right: Details ── */}
            <div className="flex-1 flex flex-col overflow-y-auto">
              <button onClick={onClose}
                      className="absolute top-4 right-4 bg-white/90 hover:bg-white p-1.5 rounded-full shadow-card z-20 transition-colors">
                <Icon name="close" size={20} />
              </button>

              <div className="p-6 flex flex-col gap-5 flex-1">
                <div>
                  <h2 className="font-headline text-2xl font-extrabold text-primary leading-tight">{hotel.name}</h2>
                  <div className="flex items-center gap-2 mt-1">
                    <div className="flex gap-0.5">
                      {Array.from({length:5},(_,i) => (
                        <Icon key={i} name="star" filled={i<Math.round(hotel.rating)} size={16}
                              className={i<Math.round(hotel.rating)?"text-amber-500":"text-outline-variant"} />
                      ))}
                    </div>
                    <span className="text-sm font-bold text-secondary">{hotel.rating.toFixed(1)}</span>
                    <span className="text-xs text-on-surface-variant">({hotel.reviewCount.toLocaleString()} reviews)</span>
                  </div>
                  <p className="text-sm text-on-surface-variant flex items-center gap-1 mt-1">
                    <Icon name="location_on" size={16} className="flex-none" />{hotel.address}
                  </p>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Featured Amenities</p>
                      {hotel.amenities.length > 4 && (
                        <button
                          onClick={() => setShowAllAmenities(v => !v)}
                          className="text-[11px] font-bold text-primary hover:text-primary-container transition-colors"
                        >
                          {showAllAmenities ? "Thu gọn" : "Xem thêm"}
                        </button>
                      )}
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      {visibleAmenities.map(a => {
                        const m = AMENITY_META[a] || { icon: "check", label: String(a) };
                        return (
                          <div key={`${a}-${showAllAmenities}`} className="flex flex-col items-center gap-1.5 px-2 py-2 bg-surface-container-low rounded-3xl w-full text-center min-h-[64px]">
                            <Icon name={m.icon} size={22} className="text-primary" />
                            <span className="text-[11px] font-headline font-semibold text-primary leading-snug whitespace-normal break-words tracking-tight">
                              {m.label}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  <div>
                    <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Nearby Landmarks</p>
                    <ul className="flex flex-col gap-1.5">
                      {hotel.nearbyLandmarks.map((l,i) => (
                        <li key={i} className="flex items-center justify-between text-sm text-on-surface-variant">
                          <span className="truncate">{l.name}</span>
                          <span className="text-[11px] font-bold text-secondary ml-2 whitespace-nowrap">{l.distance}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>

                <div className="bg-surface-container-low rounded-2xl p-4">
                  <div className="flex items-center justify-between mb-3">
                    <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Đánh giá khách</p>
                    {reviewList.length > 2 && (
                      <button
                        onClick={() => setShowAllReviews(v => !v)}
                        className="text-[11px] font-bold text-primary hover:text-primary-container transition-colors"
                      >
                        {showAllReviews ? "Thu gọn" : `Xem thêm (${reviewList.length})`}
                      </button>
                    )}
                  </div>
                  <div className="flex flex-col gap-3">
                    {visibleReviews.map((review, index) => (
                      <div key={`${review.author}-${index}`} className="flex items-start gap-3">
                        <div className="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center flex-none">
                          <Icon name="person" size={18} className="text-primary" />
                        </div>
                        <div>
                          <p className="text-xs font-bold text-primary">{review.author}</p>
                          <p className="text-xs text-on-surface-variant mt-1 leading-relaxed">{review.text}</p>
                        </div>
                      </div>
                    ))}
                    {reviewList.length === 0 && (
                      <p className="text-xs text-on-surface-variant">Chưa có đánh giá.</p>
                    )}
                  </div>
                </div>

                <div className="bg-surface-container-low rounded-2xl p-4 text-center">
                  <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">AI Score</p>
                  <p className="text-3xl font-extrabold text-primary">—</p>
                  <p className="text-xs text-on-surface-variant">Đã sẵn sàng để triển khai trong giai đoạn tiếp theo</p>
                </div>

                {/* Check Availability */}
                <div className="rounded-2xl p-5" style={{background:"#0d2d5e"}}>
                  <p className="text-white font-headline font-bold text-lg mb-4">Check Availability</p>
                  <div className="flex gap-3">
                    <div className="flex-1 rounded-xl px-4 py-3 cursor-pointer hover:brightness-110 transition-all"
                         style={{background:"rgba(255,255,255,0.12)"}}>
                      <p className="text-[10px] font-bold uppercase tracking-widest mb-1" style={{color:"rgba(255,255,255,0.6)"}}>Check In</p>
                      <p className="text-sm font-bold text-white">
                        {checkIn ? checkIn.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "Select date"}
                      </p>
                    </div>
                    <div className="flex-1 rounded-xl px-4 py-3 cursor-pointer hover:brightness-110 transition-all"
                         style={{background:"rgba(255,255,255,0.12)"}}>
                      <p className="text-[10px] font-bold uppercase tracking-widest mb-1" style={{color:"rgba(255,255,255,0.6)"}}>Check Out</p>
                      <p className="text-sm font-bold text-white">
                        {checkOut ? checkOut.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "Select date"}
                      </p>
                    </div>
                  </div>
                </div>

                <div className="bg-surface-container-low rounded-2xl p-5 text-center mt-auto">
                  <div className="flex items-baseline justify-center gap-1 mb-0.5">
                    <span className="text-3xl font-headline font-extrabold text-primary">{fmtPrice(hotel.pricePerNight)}</span>
                    <span className="text-sm text-on-surface-variant">/ night</span>
                  </div>
                  <p className="text-xs text-on-surface-variant mb-4">
                    Total for {nights} nights: {fmtPrice(total)} (incl. taxes & fees)
                  </p>
                  <div className="flex flex-col gap-2">
                    <button
                      onClick={() => alert(`Booking flow for "${hotel.name}" — wire to booking API here.`)}
                      className="w-full bg-gradient-to-r from-primary to-primary-container text-white py-3.5 rounded-2xl font-bold text-sm hover:shadow-editorial transition-shadow active:scale-95"
                    >
                      Book Now
                    </button>
                    <button
                      onClick={() => window.location.href = hotel.link || `hotel-react.html?id=${hotel.id}`}
                      className="w-full border-2 border-primary text-primary py-3 rounded-2xl font-bold text-sm hover:bg-primary-fixed transition-colors active:scale-95"
                    >
                      Visit Hotel Page
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // COMPONENT: Navbar
    // ══════════════════════════════════════════════════════════════════════════
    function Navbar() {
      const [langOpen, setLangOpen] = useState(false);
      const [lang, setLang] = useState({ code:"EN", flag:"🇺🇸" });
      const LANGS = [
        {code:"EN",flag:"🇺🇸",label:"English"},
        {code:"VI",flag:"🇻🇳",label:"Tiếng Việt"},
        {code:"ZH",flag:"🇨🇳",label:"简体中文"},
        {code:"JA",flag:"🇯🇵",label:"日本語"},
        {code:"IT",flag:"🇮🇹",label:"Italiano"},
        {code:"DE",flag:"🇩🇪",label:"Deutsch"},
      ];
      return (
        <header className="flex-none w-full z-50 glass shadow-editorial">
          <nav className="flex items-center justify-between px-6 py-3 max-w-screen-2xl mx-auto gap-4">
            <a href="homepage-react.html" className="text-2xl font-headline font-extrabold tracking-tighter text-primary whitespace-nowrap">
              Booking4LU
            </a>
            <div className="hidden md:flex items-center gap-8">
              <a href="#" className="text-sm font-semibold text-primary border-b-2 border-secondary pb-0.5">Hotels</a>
              <a href="#" className="text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors">Experiences</a>
              <a href="#" className="text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors">Social</a>
            </div>
            <div className="flex items-center gap-2">
              <div className="relative">
                <button onClick={() => setLangOpen(v=>!v)}
                        className="flex items-center gap-1 p-2 rounded-full hover:bg-surface-container transition-colors">
                  <Icon name="language" className="text-primary" size={22} />
                  <span className="text-xs font-bold text-primary">{lang.code}</span>
                </button>
                {langOpen && (
                  <div className="absolute right-0 top-full mt-2 w-44 glass rounded-xl shadow-editorial border border-outline-variant/20 z-50 overflow-hidden">
                    <div className="p-2 flex flex-col gap-0.5">
                      {LANGS.map(l => (
                        <button key={l.code}
                          onClick={() => { setLang(l); setLangOpen(false); }}
                          className={`flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                            ${lang.code===l.code?"bg-surface-container-low":"hover:bg-surface-container-low"}`}
                        >
                          {l.flag} {l.label}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              <AccountMenu />
            </div>
          </nav>
        </header>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ROOT: App
    // ══════════════════════════════════════════════════════════════════════════
    function App() {
      const [location, setLocation]   = useState("Ho Chi Minh City, Vietnam");
      const [checkIn,  setCheckIn]    = useState(() => { const d = new Date(); d.setHours(0,0,0,0); return d; });
      const [checkOut, setCheckOut]   = useState(() => { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+3); return d; });
      const [radiusM,  setRadiusM]    = useState(3000);
      const [userLoc,  setUserLoc]    = useState({ lat:10.7769, lng:106.7009 });
      const [hotels,   setHotels]     = useState([]);
      const [loading,  setLoading]    = useState(false);
      const [filters,  setFilters]    = useState({
        priceMin:null, priceMax:null, types:[], amenities:[], starRating:null, availableOnly:false,
      });
      const [guests, setGuests] = useState({
        adults: 2, children: 0, childrenAges: [],
      });
      const [minPrice, setMinPrice] = useState(1);
      const [maxPrice, setMaxPrice] = useState(5000000);
      const [searchResults, setSearchResults] = useState(null);
      const [filterOpen,  setFilterOpen]  = useState(false);
      const [activeHotel, setActiveHotel] = useState(null);
      const [sidebarWidth, setSidebarWidth] = useState(420);
      const [isResizing, setIsResizing] = useState(false);
      const resizeRef = useRef(null);

      useEffect(() => {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
          p => setUserLoc({ lat:p.coords.latitude, lng:p.coords.longitude }),
          err => console.warn("Geolocation error:", err),
          { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
        );
      }, []);

      function startSidebarResize(e) {
        e.preventDefault();
        resizeRef.current = { startX: e.clientX, startWidth: sidebarWidth };
        setIsResizing(true);
      }

      useEffect(() => {
        if (!isResizing) return;

        function onPointerMove(event) {
          if (!resizeRef.current) return;
          const delta = event.clientX - resizeRef.current.startX;
          const nextWidth = Math.max(300, Math.min(620, resizeRef.current.startWidth - delta));
          setSidebarWidth(nextWidth);
        }

        function onPointerUp() {
          setIsResizing(false);
          resizeRef.current = null;
        }

        document.addEventListener("pointermove", onPointerMove);
        document.addEventListener("pointerup", onPointerUp);

        return () => {
          document.removeEventListener("pointermove", onPointerMove);
          document.removeEventListener("pointerup", onPointerUp);
        };
      }, [isResizing]);

      // Only search when the user explicitly presses Submit.
      function handleDates({ checkIn:ci, checkOut:co }) {
        setCheckIn(ci); setCheckOut(co);
      }

      function handlePriceChange({ minPrice: mn, maxPrice: mx }) {
        setMinPrice(mn);
        setMaxPrice(mx);
      }

      async function handleSubmit() {
        // API requires children ages to be integers between 1–17; filter out age 0
        const childrenAges = guests.childrenAges
          .map(a => Math.round(a))
          .filter(a => a >= 1 && a <= 17);

        const payload = {
          language: "vi",
          address: location,
          check_in:  (checkIn  || new Date()).toISOString(),
          check_out: (checkOut || new Date()).toISOString(),
          min_price: 1,
          max_price: 1000000000,
          radius: radiusM,
          children:  childrenAges,
          adults:    guests.adults,
          personality: "string",
        };

const TARGET = "http://localhost:8010/proxy/api/v1/discover";
        // Proxies tried in order; first success wins
        const PROXIES = [
          TARGET, // last resort: direct (works if server adds CORS later)
        ];

        try {
          setLoading(true);
          let res = null;
          let lastErr = null;

          for (const url of PROXIES) {
            try {
              res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });
              if (res.ok) break; // success — stop trying
              lastErr = `HTTP ${res.status}`;
              res = null;
            } catch (e) {
              lastErr = e.message;
              res = null;
            }
          }

          if (!res) {
            console.error("All proxy attempts failed. Last error:", lastErr);
            return;
          }

          const data = await res.json();
          console.log("Search results:", data);
          setSearchResults(data);

          const inner = data?.data;
          const rawItems = Array.isArray(inner)
            ? inner
            : inner && Array.isArray(inner.hotels)
              ? inner.hotels
              : inner && Array.isArray(inner.results)
                ? inner.results
                : [];

          const normalized = rawItems.map(item => normalizeHotelResult(item, location));
          setHotels(normalized);
        } catch (err) {
          console.error("Search request failed:", err);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="h-screen flex flex-col overflow-hidden">
          <Navbar />

          <SearchBar
            location={location} setLocation={setLocation}
            checkIn={checkIn} checkOut={checkOut} setDates={handleDates}
            guests={guests} setGuests={setGuests}
            minPrice={minPrice} maxPrice={maxPrice}
            onPriceChange={handlePriceChange}
            onSubmit={handleSubmit}
          />

          <main className="flex-1 flex overflow-hidden min-h-0 relative">
            <div className="flex-1 min-w-0">
              <GoogleMapPanel
                radiusM={radiusM}
                setRadiusM={setRadiusM}
                userLocation={userLoc}
                hotels={hotels}
                activeHotel={activeHotel}
                onHotelSelect={setActiveHotel}
              />
            </div>
            <div className="relative flex-none border-l border-outline-variant/20 bg-surface-container-lowest" style={{ width: sidebarWidth, minWidth: 300, maxWidth: 620 }}>
              <div
                className={`absolute left-0 top-0 bottom-0 z-20 flex items-center justify-center px-1 ${isResizing ? "bg-primary/10" : "hover:bg-outline-variant/30"}`}
                style={{ cursor: "col-resize", width: 18, marginLeft: -18 }}
                onPointerDown={startSidebarResize}
              >
                <div className="w-1 h-16 rounded-full bg-on-surface-variant" />
              </div>
              <HotelSidebar hotels={hotels} loading={loading} onHotelClick={setActiveHotel} onFilterOpen={() => setFilterOpen(true)} />
            </div>
          </main>

          <footer className="flex-none border-t border-outline-variant/20 bg-surface-container-low">
            <div className="flex flex-col md:flex-row items-center justify-between px-10 py-4 gap-3 max-w-screen-2xl mx-auto">
              <span className="font-headline font-extrabold text-primary">Booking4LU</span>
              <div className="flex gap-6">
                {["About","Privacy","Terms","Support"].map(l => (
                  <a key={l} href="#" className="text-[11px] uppercase tracking-widest font-semibold text-on-surface-variant hover:text-secondary transition-colors">{l}</a>
                ))}
              </div>
              <p className="text-[10px] text-outline">© 2024 Booking4LU. Editorial Excellence in Travel.</p>
            </div>
          </footer>

          {filterOpen && (
            <FilterModal
              filters={filters}
              onChange={setFilters}
              onApply={() => {}}
              onClose={() => setFilterOpen(false)}
            />
          )}
          {activeHotel && (
            <HotelPopup
              hotel={activeHotel}
              checkIn={checkIn} checkOut={checkOut}
              onClose={() => setActiveHotel(null)}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
