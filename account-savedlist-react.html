<!DOCTYPE html>
<!--
  account-savedlist-react.html — Booking4LU Saved Lists Account Page (React Edition)
  Self-contained React app — no build step required.
  Features:
    ✓ Sidebar navigation (shared with My Stays)
    ✓ Featured list hero card (Dream Honeymoon)
    ✓ Grid of list cards (Business Trips, Summer 2024, Alpine Hideaways, Urban Explorations)
    ✓ "Curate with AI" card placeholder
    ✓ Create New List button
    ✓ "Mastering Your Collections" tips section
    ✓ Auth guard — redirects to login if not signed in
    ✓ All API stubs ready for backend wiring
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking4LU | Saved Lists</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:                     "#00346f",
            "primary-container":         "#004a99",
            "primary-fixed":             "#d7e2ff",
            "on-primary":                "#ffffff",
            secondary:                   "#775a19",
            "secondary-container":       "#fed488",
            "on-secondary-container":    "#785a1a",
            background:                  "#f7f9fc",
            surface:                     "#f7f9fc",
            "surface-container-lowest":  "#ffffff",
            "surface-container-low":     "#f2f4f7",
            "surface-container":         "#eceef1",
            "surface-container-high":    "#e6e8eb",
            "on-surface":                "#191c1e",
            "on-surface-variant":        "#424751",
            outline:                     "#737783",
            "outline-variant":           "#c2c6d3",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body:     ["Inter",   "sans-serif"],
          },
          boxShadow: {
            editorial: "0px 12px 32px rgba(0,52,111,0.08)",
            card:      "0px 4px 16px rgba(0,52,111,0.06)",
          },
        },
      },
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    .ms {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      font-size: 20px; line-height: 1;
      user-select: none; display: inline-block;
    }
    .ms-filled { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: fadeIn .3s ease forwards; }
    body::-webkit-scrollbar { width:6px; }
    body::-webkit-scrollbar-thumb { background:#c2c6d3; border-radius:4px; }
  </style>
</head>

<body class="bg-background font-body text-on-surface antialiased">
  <div id="root"></div>

  <script>
    // ── Mock saved lists data ──────────────────────────────────────────────
    window.MOCK_LISTS = [
      {
        id: "l1", name: "Dream Honeymoon", featured: true,
        count: 12, unit: "Destinations", badge: "Premium Only",
        description: "A private collection of secluded islands, Michelin-star dining, and ultra-luxe suites for the perfect start.",
        image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80",
        avatars: ["https://i.pravatar.cc/32?img=1","https://i.pravatar.cc/32?img=2","https://i.pravatar.cc/32?img=3"],
        extraAvatars: 9,
      },
      {
        id: "l2", name: "Business Trips", featured: false,
        count: 8, unit: "Items", badge: null,
        description: "High-speed connectivity and prime locations for the executive traveler.",
        icon: "business_center",
        image: "https://images.unsplash.com/photo-1486325212027-8081e485255e?w=600&q=80",
      },
      {
        id: "l3", name: "Summer 2024", featured: false,
        count: 24, unit: "Items", badge: null,
        description: "Beaches, festivals, and sunshine retreats carefully selected for peak season.",
        icon: "sunny",
        image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80",
      },
      {
        id: "l4", name: "Alpine Hideaways", featured: false,
        count: 6, unit: "Hotels", badge: null,
        description: "Winter Season",
        image: "https://images.unsplash.com/photo-1551524559-8af4e6624178?w=600&q=80",
      },
      {
        id: "l5", name: "Urban Explorations", featured: false,
        count: 15, unit: "Spots", badge: null,
        description: "City Breaks",
        image: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&q=80",
      },
    ];

    // ── Saved Lists API stubs ──────────────────────────────────────────────
    window.LISTS_API = {
      async getLists() {
        await new Promise(r => setTimeout(r, 250));
        return window.MOCK_LISTS;
      },
      async createList(name) {
        await new Promise(r => setTimeout(r, 400));
        const newList = {
          id: "l_" + Date.now(), name, featured: false,
          count: 0, unit: "Items", badge: null, description: "",
          image: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600&q=80",
        };
        window.MOCK_LISTS.push(newList);
        return newList;
      },
      async logout() {
        localStorage.removeItem("b4lu_user");
        window.location.href = "login-react.html";
      },
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const storedUser = JSON.parse(localStorage.getItem("b4lu_user") || "null");

    function Icon({ name, filled = false, size = 20, className = "" }) {
      return (
        <span className={`ms ${filled ? "ms-filled" : ""} ${className}`} style={{ fontSize: size }}>
          {name}
        </span>
      );
    }

    // ── Sidebar (shared) ───────────────────────────────────────────────────
    function Sidebar({ user, active }) {
      const navItems = [
        { id: "mystay",    icon: "hotel",       label: "My Stays",    href: "account-mystay-react.html" },
        { id: "savedlist", icon: "bookmark",     label: "Saved Lists", href: "account-savedlist-react.html" },
        { id: "reviews",   icon: "rate_review",  label: "Reviews",     href: "account-review-react.html" },
        { id: "friends",   icon: "group",        label: "Friends",     href: "account-friend-react.html" },
      ];

      return (
        <aside className="w-56 flex-none bg-white border-r border-outline-variant/20 flex flex-col min-h-screen">
          <div className="px-5 py-5 border-b border-outline-variant/20">
            <a href="homepage-react.html" className="font-headline font-extrabold text-lg text-primary tracking-tighter">
              Booking4LU
            </a>
          </div>

          {/* Profile mini */}
          <div className="px-5 py-4 border-b border-outline-variant/20">
            <div className="flex items-center gap-2 mb-0.5">
              <div className="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm flex-none">
                {user ? user.fullName?.[0] ?? "U" : "?"}
              </div>
              <div className="min-w-0">
                <p className="text-sm font-bold text-on-surface truncate">{user?.fullName ?? "Guest"}</p>
                <p className="text-xs text-on-surface-variant truncate">{user?.memberTier ?? ""} Member</p>
              </div>
            </div>
          </div>

          <div className="px-4 py-3 border-b border-outline-variant/20">
            <a href="homepage-react.html"
              className="block w-full text-center bg-primary text-white text-sm font-bold py-2 rounded-xl hover:bg-primary-container transition-colors">
              Book New Stay
            </a>
          </div>

          <nav className="flex-1 px-3 py-3 flex flex-col gap-0.5">
            {navItems.map(item => (
              <a key={item.id} href={item.href}
                className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-colors
                  ${active === item.id
                    ? "bg-primary-fixed text-primary"
                    : "text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface"}`}>
                <Icon name={item.icon} size={18} filled={active === item.id} />
                {item.label}
              </a>
            ))}
          </nav>

          <div className="px-3 py-4 border-t border-outline-variant/20 flex flex-col gap-0.5">
            <a href="#" className="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-on-surface-variant hover:bg-surface-container-low transition-colors">
              <Icon name="help_outline" size={18} /> Help Center
            </a>
            <button onClick={() => window.LISTS_API.logout()}
              className="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-on-surface-variant hover:bg-surface-container-low transition-colors w-full text-left">
              <Icon name="logout" size={18} /> Logout
            </button>
          </div>
        </aside>
      );
    }

    // ── Create List Modal ──────────────────────────────────────────────────
    function CreateListModal({ onClose, onCreate }) {
      const [name, setName] = useState("");
      const [loading, setLoading] = useState(false);

      async function handleSubmit(e) {
        e.preventDefault();
        if (!name.trim()) return;
        setLoading(true);
        const list = await window.LISTS_API.createList(name.trim());
        onCreate(list);
        onClose();
      }

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
          <div className="bg-white rounded-2xl shadow-editorial p-7 w-full max-w-sm mx-4 fade-in">
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-headline font-bold text-lg text-primary">Create New List</h3>
              <button onClick={onClose} className="p-1 rounded-full hover:bg-surface-container transition-colors">
                <Icon name="close" size={20} className="text-on-surface-variant" />
              </button>
            </div>
            <form onSubmit={handleSubmit} className="flex flex-col gap-4">
              <div>
                <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1.5">List Name</label>
                <input
                  type="text" value={name} onChange={e => setName(e.target.value)}
                  placeholder="e.g. Weekend Escapes" required autoFocus
                  className="w-full border border-outline-variant rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"
                />
              </div>
              <div className="flex gap-2">
                <button type="button" onClick={onClose}
                  className="flex-1 py-2.5 rounded-xl border border-outline-variant text-sm font-semibold text-on-surface-variant hover:bg-surface-container transition-colors">
                  Cancel
                </button>
                <button type="submit" disabled={loading || !name.trim()}
                  className="flex-1 py-2.5 rounded-xl bg-primary text-white text-sm font-bold hover:bg-primary-container transition-colors disabled:opacity-60">
                  {loading ? "Creating…" : "Create"}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ── Featured List Card ─────────────────────────────────────────────────
    function FeaturedListCard({ list }) {
      return (
        <div className="relative rounded-2xl overflow-hidden col-span-1 md:col-span-2 lg:col-span-1 fade-in"
             style={{ minHeight: 320 }}>
          <img src={list.image} alt={list.name} className="absolute inset-0 w-full h-full object-cover" />
          <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent" />
          <div className="relative z-10 flex flex-col justify-end h-full p-6" style={{ minHeight: 320 }}>
            <div className="flex gap-2 mb-3">
              <span className="bg-white/20 backdrop-blur-sm text-white text-xs font-bold px-2.5 py-1 rounded-full border border-white/30">
                {list.count} {list.unit}
              </span>
              {list.badge && (
                <span className="bg-secondary-container text-on-secondary-container text-xs font-bold px-2.5 py-1 rounded-full">
                  {list.badge}
                </span>
              )}
            </div>
            <h3 className="font-headline font-extrabold text-white text-2xl mb-2">{list.name}</h3>
            <p className="text-white/80 text-sm leading-relaxed mb-4">{list.description}</p>
            <div className="flex items-center justify-between">
              <button className="px-5 py-2 bg-white text-primary rounded-xl text-sm font-bold hover:bg-primary-fixed transition-colors">
                Explore List
              </button>
              {list.avatars && (
                <div className="flex items-center">
                  {list.avatars.map((av, i) => (
                    <img key={i} src={av} alt="" className="w-7 h-7 rounded-full border-2 border-white object-cover"
                         style={{ marginLeft: i > 0 ? -8 : 0 }} />
                  ))}
                  {list.extraAvatars > 0 && (
                    <div className="w-7 h-7 rounded-full bg-white/30 border-2 border-white flex items-center justify-center text-white text-xs font-bold"
                         style={{ marginLeft: -8 }}>
                      +{list.extraAvatars}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Regular List Card ──────────────────────────────────────────────────
    function ListCard({ list }) {
      return (
        <div className="relative rounded-2xl overflow-hidden fade-in group cursor-pointer" style={{ minHeight: 180 }}>
          <img src={list.image} alt={list.name} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
          <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent" />
          <div className="relative z-10 flex flex-col justify-between h-full p-4" style={{ minHeight: 180 }}>
            {list.icon && (
              <div className="w-9 h-9 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center border border-white/30">
                <Icon name={list.icon} size={18} className="text-white" />
              </div>
            )}
            <div className="mt-auto">
              <h3 className="font-headline font-bold text-white text-base mb-0.5">{list.name}</h3>
              <p className="text-white/70 text-xs">{list.description} • {list.count} {list.unit}</p>
            </div>
          </div>
          <button className="absolute top-3 right-3 z-10 p-1.5 rounded-full bg-white/20 hover:bg-white/40 transition-colors">
            <Icon name="arrow_forward_ios" size={14} className="text-white" />
          </button>
        </div>
      );
    }

    // ── AI Curate Card ─────────────────────────────────────────────────────
    function AICurateCard() {
      return (
        <div className="rounded-2xl border-2 border-dashed border-outline-variant/50 flex flex-col items-center justify-center p-6 text-center fade-in"
             style={{ minHeight: 180 }}>
          <div className="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center mb-3">
            <Icon name="auto_awesome" size={22} className="text-primary" />
          </div>
          <p className="font-bold text-on-surface text-sm mb-1">Curate with AI</p>
          <p className="text-xs text-on-surface-variant leading-relaxed mb-4">
            Let our digital concierge suggest a list based on your taste.
          </p>
          <button className="text-xs font-bold text-secondary uppercase tracking-wider hover:text-secondary/70 transition-colors">
            Start Magic Search
          </button>
        </div>
      );
    }

    // ── Tips Section ───────────────────────────────────────────────────────
    function TipsSection() {
      const tips = [
        { num: "01", title: "Smart Sorting", desc: "Your lists now automatically sort by price drop alerts and seasonal availability." },
        { num: "02", title: "Shared Access", desc: "Invite travel companions to 'Saved Lists' to vote on your next stay." },
        { num: "03", title: "Offline Export", desc: "Generate a prestige PDF itinerary for any list with one click." },
      ];
      return (
        <div className="mt-10 flex flex-col md:flex-row gap-6 items-start">
          <div className="md:w-72 flex-none rounded-2xl overflow-hidden bg-surface-container-high" style={{ minHeight: 200 }}>
            <img
              src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80"
              alt="Collections"
              className="w-full h-full object-cover"
              style={{ minHeight: 200 }}
            />
          </div>
          <div className="flex-1">
            <h2 className="font-headline font-extrabold text-2xl text-on-surface mb-5">Mastering Your Collections</h2>
            <div className="flex flex-col gap-5">
              {tips.map(t => (
                <div key={t.num} className="flex gap-4">
                  <div className="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center flex-none">
                    <span className="text-xs font-extrabold text-on-secondary-container">{t.num}</span>
                  </div>
                  <div>
                    <p className="font-bold text-on-surface text-sm mb-0.5">{t.title}</p>
                    <p className="text-sm text-on-surface-variant leading-relaxed">{t.desc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Main App ───────────────────────────────────────────────────────────
    function App() {
      const [lists, setLists] = useState([]);
      const [showCreate, setShowCreate] = useState(false);
      const user = storedUser;

      useEffect(() => {
        if (!user) {
          window.location.href = "login-react.html";
          return;
        }
        window.LISTS_API.getLists().then(setLists);
      }, []);

      function handleCreate(newList) {
        setLists(prev => [...prev, newList]);
      }

      if (!user) return null;

      const featured = lists.find(l => l.featured);
      const regular  = lists.filter(l => !l.featured);

      return (
        <div className="flex min-h-screen bg-background">
          <Sidebar user={user} active="savedlist" />

          <main className="flex-1 overflow-y-auto">
            <div className="max-w-5xl mx-auto px-6 py-8">
              {/* Header */}
              <div className="mb-2">
                <p className="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Curation</p>
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <h1 className="font-headline font-extrabold text-3xl text-on-surface">Your Saved Lists</h1>
                    <p className="text-sm text-on-surface-variant mt-1 max-w-lg">
                      Organize your next global adventures into themed collections for seamless planning and prestige access.
                    </p>
                  </div>
                  <button onClick={() => setShowCreate(true)}
                    className="flex items-center gap-2 px-4 py-2.5 bg-white border border-outline-variant/40 rounded-xl text-sm font-bold text-on-surface hover:bg-surface-container transition-colors flex-none shadow-card">
                    <Icon name="add" size={18} className="text-primary" />
                    Create New List
                  </button>
                </div>
              </div>

              {/* Lists grid */}
              <div className="mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {/* Featured */}
                {featured && (
                  <div className="lg:col-span-2 row-span-2">
                    <FeaturedListCard list={featured} />
                  </div>
                )}

                {/* Regular cards */}
                {regular.slice(0, 2).map(l => (
                  <ListCard key={l.id} list={l} />
                ))}
              </div>

              {/* Second row */}
              {regular.length > 2 && (
                <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {regular.slice(2).map(l => (
                    <ListCard key={l.id} list={l} />
                  ))}
                  <AICurateCard />
                </div>
              )}

              <TipsSection />
            </div>
          </main>

          {showCreate && (
            <CreateListModal onClose={() => setShowCreate(false)} onCreate={handleCreate} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
