<!DOCTYPE html>
<!--
  login-react.html — Booking4LU Login & Sign Up Page (React Edition)
  Self-contained React app — no build step required.
  Features:
    ✓ Login form (username/email + password, remember me, forgot password)
    ✓ Sign Up form (username, full name, national ID, DOB, gender, email, phone, zip)
    ✓ Auth state stored in localStorage for frontend demo
    ✓ Redirects to account-mystay-react.html after successful login/signup
    ✓ All API stubs ready for backend wiring
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking4LU | Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:                     "#00346f",
            "primary-container":         "#004a99",
            "primary-fixed":             "#d7e2ff",
            "on-primary":                "#ffffff",
            secondary:                   "#775a19",
            "secondary-container":       "#fed488",
            "on-secondary-container":    "#785a1a",
            background:                  "#f7f9fc",
            surface:                     "#f7f9fc",
            "surface-container-lowest":  "#ffffff",
            "surface-container-low":     "#f2f4f7",
            "surface-container":         "#eceef1",
            "on-surface":                "#191c1e",
            "on-surface-variant":        "#424751",
            outline:                     "#737783",
            "outline-variant":           "#c2c6d3",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body:     ["Inter",   "sans-serif"],
          },
          boxShadow: {
            editorial: "0px 12px 32px rgba(0,52,111,0.08)",
            card:      "0px 4px 16px rgba(0,52,111,0.06)",
          },
        },
      },
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    .ms {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      font-size: 20px; line-height: 1;
      user-select: none; display: inline-block;
    }
    .glass {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: fadeIn .3s ease forwards; }

    input[type="date"]::-webkit-calendar-picker-indicator { opacity:.5; cursor:pointer; }

    /* Hero background */
    .hero-bg {
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80');
      background-size: cover;
      background-position: center;
    }
    .hero-overlay {
      background: linear-gradient(to right, rgba(0,20,50,0.72) 0%, rgba(0,20,50,0.30) 60%, transparent 100%);
    }
  </style>
</head>

<body class="font-body text-on-surface antialiased min-h-screen">
  <div id="root"></div>

  <script>
    // ── Auth API stubs ─────────────────────────────────────────────────────
    window.AUTH_API = {
      /** Login — replace with real POST /api/auth/login */
      async login({ username, password, remember }) {
        await new Promise(r => setTimeout(r, 600));
        // Demo: accept any non-empty credentials
        if (!username || !password) throw new Error("Please fill in all fields.");
        const user = {
          id: "u1",
          username,
          fullName: "Alexander Sterling",
          email: username.includes("@") ? username : username + "@example.com",
          memberTier: "Azure Prestige",
          avatar: null,
        };
        localStorage.setItem("b4lu_user", JSON.stringify(user));
        if (remember) localStorage.setItem("b4lu_remember", "1");
        return user;
      },

      /** Sign Up — replace with real POST /api/auth/register */
      async register({ username, fullName, nationalId, dob, gender, email, phone, zipCode }) {
        await new Promise(r => setTimeout(r, 800));
        if (!username || !fullName || !email) throw new Error("Please fill in all required fields.");
        const user = {
          id: "u_" + Date.now(),
          username,
          fullName,
          email,
          memberTier: "Standard",
          avatar: null,
        };
        localStorage.setItem("b4lu_user", JSON.stringify(user));
        return user;
      },

      /** Forgot password — replace with real POST /api/auth/forgot-password */
      async forgotPassword({ email }) {
        await new Promise(r => setTimeout(r, 500));
        return { message: "Reset link sent to " + email };
      },
    };
  </script>

  <script type="text/babel">
    const { useState, useRef } = React;

    function Icon({ name, size = 20, className = "" }) {
      return (
        <span className={`ms ${className}`} style={{ fontSize: size }}>{name}</span>
      );
    }

    // ── Forgot Password Modal ──────────────────────────────────────────────
    function ForgotPasswordModal({ onClose }) {
      const [email, setEmail] = useState("");
      const [loading, setLoading] = useState(false);
      const [sent, setSent] = useState(false);
      const [error, setError] = useState("");

      async function handleSubmit(e) {
        e.preventDefault();
        setLoading(true); setError("");
        try {
          await window.AUTH_API.forgotPassword({ email });
          setSent(true);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
          <div className="bg-white rounded-2xl shadow-editorial p-8 w-full max-w-sm mx-4 fade-in">
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-headline font-bold text-lg text-primary">Reset Password</h3>
              <button onClick={onClose} className="p-1 rounded-full hover:bg-surface-container transition-colors">
                <Icon name="close" size={20} className="text-on-surface-variant" />
              </button>
            </div>
            {sent ? (
              <div className="text-center py-4">
                <Icon name="mark_email_read" size={48} className="text-primary mb-3" />
                <p className="font-semibold text-on-surface mb-1">Check your inbox</p>
                <p className="text-sm text-on-surface-variant">A reset link has been sent to <strong>{email}</strong></p>
                <button onClick={onClose} className="mt-5 w-full bg-primary text-white py-2.5 rounded-xl font-bold text-sm hover:bg-primary-container transition-colors">
                  Done
                </button>
              </div>
            ) : (
              <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                <p className="text-sm text-on-surface-variant">Enter your email address and we'll send you a reset link.</p>
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1.5">Email Address</label>
                  <input
                    type="email" value={email} onChange={e => setEmail(e.target.value)}
                    placeholder="you@example.com" required
                    className="w-full border border-outline-variant rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"
                  />
                </div>
                {error && <p className="text-red-500 text-xs">{error}</p>}
                <button type="submit" disabled={loading}
                  className="w-full bg-primary text-white py-2.5 rounded-xl font-bold text-sm hover:bg-primary-container transition-colors disabled:opacity-60">
                  {loading ? "Sending…" : "Send Reset Link"}
                </button>
              </form>
            )}
          </div>
        </div>
      );
    }

    // ── Login Form ─────────────────────────────────────────────────────────
    function LoginForm({ onForgot }) {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [remember, setRemember] = useState(false);
      const [showPw, setShowPw] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      async function handleSubmit(e) {
        e.preventDefault();
        setLoading(true); setError("");
        try {
          await window.AUTH_API.login({ username, password, remember });
          window.location.href = "account-mystay-react.html";
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <div>
            <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1.5">
              Username or Email
            </label>
            <input
              type="text" value={username} onChange={e => setUsername(e.target.value)}
              placeholder="alex.lux@example.com" required
              className="w-full border border-outline-variant rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all bg-surface-container-low/50"
            />
          </div>
          <div>
            <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1.5">
              Password
            </label>
            <div className="relative">
              <input
                type={showPw ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)}
                placeholder="••••••••" required
                className="w-full border border-outline-variant rounded-xl px-4 py-3 pr-11 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all bg-surface-container-low/50"
              />
              <button type="button" onClick={() => setShowPw(v => !v)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                <Icon name={showPw ? "visibility_off" : "visibility"} size={18} />
              </button>
            </div>
          </div>
          <div className="flex items-center justify-between">
            <label className="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" checked={remember} onChange={e => setRemember(e.target.checked)}
                className="rounded border-outline-variant text-primary focus:ring-primary/30" />
              <span className="text-sm text-on-surface-variant">Remember me</span>
            </label>
            <button type="button" onClick={onForgot}
              className="text-sm font-semibold text-secondary hover:text-secondary/80 transition-colors">
              Forgot password?
            </button>
          </div>
          {error && (
            <div className="flex items-center gap-2 bg-red-50 border border-red-200 rounded-xl px-3 py-2">
              <Icon name="error_outline" size={16} className="text-red-500 flex-none" />
              <p className="text-red-600 text-xs">{error}</p>
            </div>
          )}
          <button type="submit" disabled={loading}
            className="w-full bg-primary text-white py-3 rounded-xl font-bold text-sm hover:bg-primary-container transition-colors disabled:opacity-60 mt-1">
            {loading ? "Signing in…" : "Log In"}
          </button>
          <p className="text-center text-sm text-on-surface-variant mt-1">
            Don't have an account yet? Use the registration form to join us.
          </p>
        </form>
      );
    }

    // ── Sign Up Form ───────────────────────────────────────────────────────
    function SignUpForm() {
      const COUNTRY_CODES = [
        { code: "+84", flag: "🇻🇳", label: "VN" },
        { code: "+1",  flag: "🇺🇸", label: "US" },
        { code: "+44", flag: "🇬🇧", label: "GB" },
        { code: "+81", flag: "🇯🇵", label: "JP" },
        { code: "+86", flag: "🇨🇳", label: "CN" },
        { code: "+33", flag: "🇫🇷", label: "FR" },
        { code: "+49", flag: "🇩🇪", label: "DE" },
      ];

      const [form, setForm] = useState({
        username: "", fullName: "", nationalId: "", dob: "",
        gender: "", email: "", phone: "", zipCode: "", countryCode: "+84",
      });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      function set(field) { return e => setForm(f => ({ ...f, [field]: e.target.value })); }

      async function handleSubmit(e) {
        e.preventDefault();
        setLoading(true); setError("");
        try {
          await window.AUTH_API.register(form);
          window.location.href = "account-mystay-react.html";
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      const inputCls = "w-full border border-outline-variant rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all bg-surface-container-low/40";

      return (
        <form onSubmit={handleSubmit} className="flex flex-col gap-3">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Username</label>
              <input type="text" value={form.username} onChange={set("username")} required className={inputCls} />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Full Name</label>
              <input type="text" value={form.fullName} onChange={set("fullName")} required className={inputCls} />
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">National ID (CMND)</label>
              <input type="text" value={form.nationalId} onChange={set("nationalId")} className={inputCls} />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Date of Birth</label>
              <input type="date" value={form.dob} onChange={set("dob")} className={inputCls} />
            </div>
          </div>
          <div>
            <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Gender</label>
            <div className="flex gap-4 mt-1">
              {["Male", "Female", "Other"].map(g => (
                <label key={g} className="flex items-center gap-1.5 cursor-pointer text-sm text-on-surface-variant">
                  <input type="radio" name="gender" value={g} checked={form.gender === g} onChange={set("gender")}
                    className="text-primary focus:ring-primary/30" />
                  {g}
                </label>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Email Address</label>
            <input type="email" value={form.email} onChange={set("email")} required className={inputCls} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Phone Number</label>
              <div className="flex gap-1.5">
                <select value={form.countryCode} onChange={set("countryCode")}
                  className="border border-outline-variant rounded-xl px-2 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary bg-surface-container-low/40 w-20">
                  {COUNTRY_CODES.map(c => (
                    <option key={c.code} value={c.code}>{c.flag} {c.code}</option>
                  ))}
                </select>
                <input type="tel" value={form.phone} onChange={set("phone")} className={inputCls} />
              </div>
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Zip Code</label>
              <input type="text" value={form.zipCode} onChange={set("zipCode")} className={inputCls} />
            </div>
          </div>
          {error && (
            <div className="flex items-center gap-2 bg-red-50 border border-red-200 rounded-xl px-3 py-2">
              <Icon name="error_outline" size={16} className="text-red-500 flex-none" />
              <p className="text-red-600 text-xs">{error}</p>
            </div>
          )}
          <button type="submit" disabled={loading}
            className="w-full bg-primary text-white py-3 rounded-xl font-bold text-sm hover:bg-primary-container transition-colors disabled:opacity-60 mt-1">
            {loading ? "Creating account…" : "Sign Up"}
          </button>
        </form>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────
    function App() {
      const [showForgot, setShowForgot] = useState(false);

      return (
        <div className="min-h-screen flex flex-col">
          {/* Navbar */}
          <header className="absolute top-0 left-0 right-0 z-30 flex items-center justify-between px-8 py-4">
            <a href="homepage-react.html" className="text-xl font-headline font-extrabold tracking-tighter text-white drop-shadow">
              Booking4LU
            </a>
            <nav className="hidden md:flex items-center gap-8">
              <a href="homepage-react.html" className="text-sm font-semibold text-white/80 hover:text-white transition-colors">Hotels</a>
              <a href="#" className="text-sm font-semibold text-white/80 hover:text-white transition-colors">Experiences</a>
              <a href="#" className="text-sm font-semibold text-white/80 hover:text-white transition-colors">Social</a>
            </nav>
            <div className="flex items-center gap-3">
              <button className="p-2 rounded-full hover:bg-white/10 transition-colors">
                <Icon name="language" size={20} className="text-white" />
              </button>
              <button className="p-2 rounded-full hover:bg-white/10 transition-colors">
                <Icon name="account_circle" size={22} className="text-white" />
              </button>
            </div>
          </header>

          {/* Hero + Forms */}
          <div className="flex-1 flex min-h-screen">
            {/* Left hero */}
            <div className="hero-bg flex-1 relative hidden md:flex flex-col justify-center px-12 lg:px-16">
              <div className="hero-overlay absolute inset-0" />
              <div className="relative z-10 max-w-sm">
                <h1 className="font-headline font-extrabold text-white text-4xl lg:text-5xl leading-tight mb-4">
                  The Art of<br />
                  <span className="text-secondary-container">Exceptional</span> Travel.
                </h1>
                <p className="text-white/80 text-base leading-relaxed mb-8">
                  Welcome to the Digital Concierge. Whether you're returning for another escape or joining our inner circle, luxury awaits.
                </p>
                <div className="flex items-center gap-3 bg-white/10 backdrop-blur-sm rounded-2xl px-4 py-3 border border-white/20 w-fit">
                  <div className="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center flex-none">
                    <Icon name="verified" size={18} className="text-primary" />
                  </div>
                  <div>
                    <p className="text-white font-bold text-sm">Verified Excellence</p>
                    <p className="text-white/70 text-xs">Every property curated for perfection.</p>
                  </div>
                </div>
              </div>
            </div>

            {/* Right: forms panel */}
            <div className="w-full md:w-auto md:min-w-[600px] lg:min-w-[680px] bg-surface-container-low/60 backdrop-blur-xl flex items-center justify-center px-6 py-20 md:py-8">
              <div className="w-full max-w-[620px] flex flex-col md:flex-row gap-0 bg-white/80 backdrop-blur-xl rounded-3xl shadow-editorial overflow-hidden border border-white/60">

                {/* Login column */}
                <div className="flex-1 p-7 border-b md:border-b-0 md:border-r border-outline-variant/20">
                  <h2 className="font-headline font-bold text-2xl text-primary mb-1">Welcome back</h2>
                  <p className="text-sm text-on-surface-variant mb-6">Please enter your credentials to access your account.</p>
                  <LoginForm onForgot={() => setShowForgot(true)} />
                </div>

                {/* Sign Up column */}
                <div className="flex-1 p-7">
                  <h2 className="font-headline font-bold text-2xl text-primary mb-1">New Member</h2>
                  <p className="text-sm text-on-surface-variant mb-6">Join the circle of premium travelers.</p>
                  <SignUpForm />
                </div>
              </div>
            </div>
          </div>

          {/* Footer */}
          <footer className="bg-white border-t border-outline-variant/20 px-8 py-5 flex flex-col sm:flex-row items-center justify-between gap-3">
            <span className="font-headline font-bold text-primary text-base">Booking4LU</span>
            <div className="flex items-center gap-6 text-xs font-semibold text-on-surface-variant uppercase tracking-wider">
              <a href="#" className="hover:text-primary transition-colors">About</a>
              <a href="#" className="hover:text-primary transition-colors">Contact</a>
              <a href="#" className="hover:text-primary transition-colors">Privacy</a>
              <a href="#" className="hover:text-primary transition-colors">Terms</a>
              <a href="#" className="hover:text-primary transition-colors">Support</a>
            </div>
            <span className="text-xs text-on-surface-variant">© 2024 Booking4LU. Editorial Excellence</span>
          </footer>

          {showForgot && <ForgotPasswordModal onClose={() => setShowForgot(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
