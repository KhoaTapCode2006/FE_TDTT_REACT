<html lang="en">

  <style>
    body { font-family:'Inter',sans-serif; background-color:#f7f9fc; }
    h1,h2,h3,h4,.font-headline { font-family:'Manrope',sans-serif; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; line-height:1; }
    .icon-fill { font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24; }
    .glass-modal { background:rgba(224,227,230,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
    .photo-tilt-1 { transform:rotate(-2deg); transition: transform 0.5s ease; }
    .photo-tilt-2 { transform:rotate(3deg); transition: transform 0.5s ease; }
    .photo-tilt-1:hover,.photo-tilt-2:hover { transform:rotate(0deg); }
    .review-card { transition: opacity 0.4s ease, transform 0.4s ease; }
    .lb-img { transition: opacity 0.15s ease; }
  </style>
</head>
<body class="text-on-surface">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Data ──────────────────────────────────────────────────────────────────────

      { src: "https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=400&q=80", alt: "Pool", size: "small" },

    ],

  {

    text: `Great central location and very chic interior design. The automated check-in was seamless. Only minor issue was the street noise on Friday night, but the provided noise-canceling machine helped significantly. Would definitely recommend for business travelers.`,
    italic: false,

    tagStyle: "check",
    helpful: null,

    bgBlob: "secondary",

  },
  {

    rating: 5, verified: false, nights: null,

    layout: "text-only",
    initiallyHidden: false,
  },
  {
    id: 4, hotel: "Coral Bay Villas", date: "2023-05", dateLabel: "May 2023",

    tagStyle: "pill",

    initiallyHidden: true,

  {

    bgBlob: "primary",
    initiallyHidden: true,
  },
  {

    layout: "text-only",
    initiallyHidden: true,
  },
];

// ── Star Row ──────────────────────────────────────────────────────────────────
function StarRow({ rating, size = "text-[20px]" }) {
  return (
    <div className="star-row flex items-center gap-0.5 mt-1">
      {[1,2,3,4,5].map(i => (
        <span key={i} className={`material-symbols-outlined ${size} ${i <= rating ? "icon-fill text-amber-400" : "text-outline-variant"}`}>star</span>
      ))}
    </div>
  );
}

// ── Tag Pills ─────────────────────────────────────────────────────────────────
function Tags({ tags, tagStyle }) {
  if (!tags || tags.length === 0) return null;
  if (tagStyle === "pill") return (
    <div className="flex flex-wrap gap-2 mb-6">
      {tags.map((t, i) => (
        <span key={i} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-tertiary/10 text-tertiary text-xs font-bold">
          <span className="material-symbols-outlined text-[14px]">{t.icon}</span>{t.label}
        </span>
      ))}
    </div>
  );
  if (tagStyle === "check") return (
    <div className="flex flex-wrap gap-3 mb-5">
      {tags.map((t, i) => (
        <span key={i} className="inline-flex items-center gap-1.5 text-xs font-bold text-on-surface uppercase tracking-wider">
          <span className="material-symbols-outlined icon-fill text-green-500 text-[16px]">{t.icon}</span>{t.label}
        </span>
      ))}
    </div>
  );
  return null;
}

// ── Card Footer ───────────────────────────────────────────────────────────────
function CardFooter({ helpful, onEdit, onDelete }) {
  return (
    <div className={`flex ${helpful ? "items-center justify-between" : "justify-end"} pt-5 border-t border-outline-variant/20`}>
      {helpful && (
        <div className="flex items-center gap-2">
          <div className="flex -space-x-2">
            {helpful.avatars.map((a, i) => (
              <img key={i} src={a} className="w-7 h-7 rounded-full border-2 border-white" alt="" />
            ))}
          </div>
          <span className="text-xs font-semibold text-on-surface-variant">{helpful.count} travelers found this helpful</span>
        </div>
      )}
      <div className="flex items-center gap-3">
        <button onClick={onEdit} className="flex items-center gap-1.5 text-primary font-bold text-sm hover:text-primary-container transition-colors">
          Edit <span className="material-symbols-outlined text-[16px]">edit</span>
        </button>
        <button onClick={onDelete} className="flex items-center gap-1.5 text-error font-bold text-sm hover:text-red-700 transition-colors">
          Delete <span className="material-symbols-outlined text-[16px]">delete</span>
        </button>
      </div>
    </div>
  );
}
</script>

<script type="text/babel">
// ── Review Card 1: Side Photos Layout ─────────────────────────────────────────
function CardSidePhotos({ review, onEdit, onDelete, onLightbox }) {
  return (
    <article className="review-card flex flex-col lg:flex-row gap-0 rounded-3xl overflow-hidden shadow-[0_8px_40px_rgba(0,52,111,0.08)] bg-surface-container-lowest">
      <div className="flex-1 p-8 lg:p-10 flex flex-col">
        <div className="flex items-start justify-between mb-4">
          <div>
            <span className="inline-flex items-center gap-1.5 text-[11px] font-black uppercase tracking-widest text-secondary mb-2">
              <span className="material-symbols-outlined icon-fill text-[14px]">verified</span>
              Verified Stay &nbsp;·&nbsp; {review.dateLabel}
            </span>
            <h2 className="font-headline text-2xl font-extrabold text-primary">{review.hotel}</h2>
          </div>
          <StarRow rating={review.rating} />
        </div>
        <p className={`review-text text-on-surface-variant leading-relaxed text-[15px] ${review.italic ? "italic" : ""} mb-6 flex-1`}>
          {review.text}
        </p>
        <Tags tags={review.tags} tagStyle={review.tagStyle} />
        <CardFooter helpful={review.helpful} onEdit={onEdit} onDelete={onDelete} />
      </div>
      <div className="w-full lg:w-72 bg-surface-container-low flex flex-col gap-4 p-6 justify-center items-center">
        <div className="w-full h-44 rounded-2xl overflow-hidden shadow-xl photo-tilt-1 cursor-pointer" onClick={() => onLightbox(review.photos, 0)}>
          <img src={review.photos[0].src} alt={review.photos[0].alt} className="w-full h-full object-cover" />
        </div>
        <div className="grid grid-cols-2 gap-3 w-full">
          {review.photos.slice(1).map((p, i) => (
            <div key={i} className={`aspect-square rounded-xl overflow-hidden shadow-md cursor-pointer ${i % 2 === 0 ? "photo-tilt-2" : "photo-tilt-1"}`}
                 onClick={() => onLightbox(review.photos, i + 1)}>
              <img src={p.src} alt={p.alt} className="w-full h-full object-cover" />
            </div>
          ))}
        </div>
      </div>
    </article>
  );
}

// ── Review Card: Inline Photo Layout ─────────────────────────────────────────
function CardInlinePhoto({ review, onEdit, onDelete, onLightbox }) {
  const blobColor = review.bgBlob === "secondary" ? "bg-secondary/10" : "bg-primary/5";
  return (
    <article className={`review-card relative bg-surface-container-lowest rounded-3xl overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.05)] p-8 lg:p-10`}>
      {review.bgBlob && (
        <div className={`absolute top-0 right-0 w-72 h-72 ${blobColor} rounded-full blur-3xl -mr-24 -mt-24 pointer-events-none`}></div>
      )}
      <div className="relative z-10 flex flex-col md:flex-row gap-8 items-start">
        <div className="flex-1">
          <div className="flex items-start justify-between mb-4">
            <div>
              {review.verified
                ? <span className="inline-flex items-center gap-1.5 text-[11px] font-black uppercase tracking-widest text-secondary mb-1">
                    <span className="material-symbols-outlined icon-fill text-[14px]">verified</span>
                    Verified Stay &nbsp;·&nbsp; {review.dateLabel}
                  </span>
                : <p className="text-[11px] font-black uppercase tracking-widest text-secondary mb-1">Stayed: {review.dateLabel}</p>
              }
              <h3 className="font-headline text-xl font-bold text-primary">{review.hotel}</h3>
            </div>
            <StarRow rating={review.rating} />
          </div>
          <p className={`review-text text-on-surface-variant leading-relaxed text-[15px] ${review.italic ? "italic" : ""} mb-5`}>
            {review.text}
          </p>
          <Tags tags={review.tags} tagStyle={review.tagStyle} />
          <div className="flex justify-end pt-4 border-t border-outline-variant/20">
            <div className="flex items-center gap-3">
              <button onClick={onEdit} className="flex items-center gap-1.5 text-primary font-bold text-sm hover:text-primary-container transition-colors">
                Edit <span className="material-symbols-outlined text-[16px]">edit</span>
              </button>
              <button onClick={onDelete} className="flex items-center gap-1.5 text-error font-bold text-sm hover:text-red-700 transition-colors">
                Delete <span className="material-symbols-outlined text-[16px]">delete</span>
              </button>
            </div>
          </div>
        </div>
        {review.photos.length > 0 && (
          <div className="flex-shrink-0 w-full md:w-52">
            <div className="aspect-[4/3] rounded-2xl overflow-hidden border-4 border-white shadow-2xl cursor-pointer"
                 onClick={() => onLightbox(review.photos, 0)}>
              <img src={review.photos[0].src} alt={review.photos[0].alt} className="w-full h-full object-cover" />
            </div>
          </div>
        )}
      </div>
    </article>
  );
}

// ── Review Card: Text Only Layout ─────────────────────────────────────────────
function CardTextOnly({ review, onEdit, onDelete }) {
  const blobColor = review.bgBlob === "primary" ? "bg-primary/5" : null;
  return (
    <article className={`review-card ${blobColor ? "relative" : ""} bg-surface-container-lowest rounded-3xl border border-outline-variant/20 shadow-[0_2px_16px_rgba(0,0,0,0.04)] p-8 ${blobColor ? "overflow-hidden" : ""}`}>
      {blobColor && <div className={`absolute top-0 right-0 w-64 h-64 ${blobColor} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none`}></div>}
      <div className={`${blobColor ? "relative z-10 " : ""}flex flex-col gap-4`}>
        <div className="flex items-start justify-between">
          <div>
            {review.verified
              ? <span className="inline-flex items-center gap-1.5 text-[11px] font-black uppercase tracking-widest text-secondary mb-1">
                  <span className="material-symbols-outlined icon-fill text-[14px]">verified</span>
                  Verified Stay &nbsp;·&nbsp; {review.dateLabel}
                </span>
              : <p className="text-[11px] font-black uppercase tracking-widest text-secondary mb-1">
                  {review.nights ? `Stayed: ${review.dateLabel}` : review.dateLabel}
                </p>
            }
            <h3 className="font-headline font-bold text-xl text-primary">{review.hotel}</h3>
          </div>
          <StarRow rating={review.rating} />
        </div>
        <p className="review-text text-on-surface-variant text-[15px] leading-relaxed">{review.text}</p>
        <Tags tags={review.tags} tagStyle={review.tagStyle} />
        {review.helpful
          ? <CardFooter helpful={review.helpful} onEdit={onEdit} onDelete={onDelete} />
          : <div className="flex justify-end pt-4 border-t border-outline-variant/20">
              <div className="flex items-center gap-3">
                <button onClick={onEdit} className="flex items-center gap-1.5 text-primary font-bold text-sm hover:text-primary-container transition-colors">
                  Edit <span className="material-symbols-outlined text-[16px]">edit</span>
                </button>
                <button onClick={onDelete} className="flex items-center gap-1.5 text-error font-bold text-sm hover:text-red-700 transition-colors">
                  Delete <span className="material-symbols-outlined text-[16px]">delete</span>
                </button>
              </div>
            </div>
        }
      </div>
    </article>
  );

</script>

<script type="text/babel">
// ── Filter Modal ──────────────────────────────────────────────────────────────
function FilterModal({ onClose, onApply, sortMode, setSortMode, ratingFilter, setRatingFilter }) {
  const rangeLabels = ["All Stars","1 Star","2 Stars","3 Stars","4 Stars","5 Stars"];
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
      <div className="absolute inset-0 bg-black/20" onClick={onClose}></div>
      <div className="relative w-full max-w-md glass-modal rounded-[2.5rem] p-10 shadow-2xl">
        <div className="flex items-center justify-between mb-8">
          <h4 className="font-headline text-2xl font-extrabold text-primary">Filter Reviews</h4>
          <button onClick={onClose} className="w-10 h-10 rounded-full hover:bg-white/60 flex items-center justify-center transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">close</span>
          </button>
        </div>
        <div className="space-y-7">
          <div>
            <label className="block text-[11px] font-black uppercase tracking-widest text-on-surface-variant mb-3">Sort By</label>
            <div className="flex flex-wrap gap-2">
              {["recent","rating","photos"].map(mode => (
                <button key={mode} onClick={() => setSortMode(mode)}
                        className={`px-5 py-2.5 rounded-full font-bold text-sm shadow-sm transition-colors ${sortMode === mode ? "bg-primary text-white" : "bg-white text-primary hover:bg-surface-container-low"}`}>
                  {mode === "recent" ? "Most Recent" : mode === "rating" ? "Highest Rating" : "Photos Only"}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-[11px] font-black uppercase tracking-widest text-on-surface-variant mb-3">
              Rating Range — <span className="text-primary normal-case font-black">{rangeLabels[ratingFilter]}</span>
            </label>
            <input type="range" min="0" max="5" value={ratingFilter}
                   onChange={e => setRatingFilter(parseInt(e.target.value))}
                   className="w-full h-2 rounded-full appearance-none cursor-pointer accent-primary bg-outline-variant/40" />
            <div className="flex justify-between text-xs font-bold text-on-surface-variant mt-2">
              <span>All</span><span>1★</span><span>2★</span><span>3★</span><span>4★</span><span>5★</span>
            </div>
          </div>
        </div>
        <button onClick={onApply}
                className="w-full mt-10 py-4 bg-primary text-white rounded-2xl font-headline font-bold text-base shadow-xl hover:bg-primary-container transition-colors active:scale-95">
          Apply Filters
        </button>
      </div>
    </div>
  );
}

// ── Edit Modal ────────────────────────────────────────────────────────────────
function EditModal({ review, onClose, onSave }) {
  const [text, setText] = useState(review.text);
  const [rating, setRating] = useState(review.rating);
  const ratingLabels = ["","1 / 5 — Poor","2 / 5 — Fair","3 / 5 — Good","4 / 5 — Great","5 / 5 — Excellent"];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
      <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
      <div className="relative w-full max-w-lg bg-white rounded-[2rem] shadow-2xl overflow-hidden">
        <div className="h-1.5 w-full bg-gradient-to-r from-primary to-primary-container"></div>
        <div className="p-8">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h4 className="font-headline text-xl font-extrabold text-primary">Edit Review</h4>
              <p className="text-xs text-on-surface-variant mt-0.5">{review.hotel}</p>
            </div>
            <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-surface-container flex items-center justify-center transition-colors">
              <span className="material-symbols-outlined text-on-surface-variant text-[20px]">close</span>
            </button>
          </div>
          <div className="mb-6">
            <label className="block text-[11px] font-black uppercase tracking-widest text-on-surface-variant mb-3">Your Rating</label>
            <div className="flex items-center gap-1">
              {[1,2,3,4,5].map(i => (
                <button key={i} type="button" onClick={() => setRating(i)} className="transition-transform hover:scale-110">
                  <span className={`material-symbols-outlined text-[36px] ${i <= rating ? "icon-fill text-amber-400" : "text-outline-variant"}`}>star</span>
                </button>
              ))}
              <span className="ml-3 text-sm font-bold text-secondary">{ratingLabels[rating]}</span>
            </div>
          </div>
          <div className="mb-6">
            <label className="block text-[11px] font-black uppercase tracking-widest text-on-surface-variant mb-3">Review Content</label>
            <textarea rows="5" value={text} onChange={e => setText(e.target.value)} maxLength={600}
              className="w-full rounded-2xl border border-outline-variant bg-surface-container-low px-4 py-3 text-[15px] text-on-surface leading-relaxed resize-none focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all placeholder:text-outline"
              placeholder="Share your experience..." />
            <div className="flex justify-end mt-1.5">
              <span className={`text-xs ${text.length > 600 ? "text-error" : "text-outline"}`}>{text.length} / 600</span>
            </div>
          </div>
          <div className="flex items-center gap-3 pt-2">
            <button onClick={onClose} className="flex-1 py-3 rounded-2xl border-2 border-outline-variant text-on-surface-variant font-headline font-bold text-sm hover:bg-surface-container transition-colors active:scale-95">
              Cancel
            </button>
            <button onClick={() => onSave(text, rating)}
                    className="flex-1 py-3 rounded-2xl bg-primary text-white font-headline font-bold text-sm shadow-lg hover:bg-primary-container transition-colors active:scale-95 flex items-center justify-center gap-2">
              <span className="material-symbols-outlined text-[18px]">check</span>Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function Lightbox({ photos, startIndex, onClose }) {
  const [index, setIndex] = useState(startIndex);
  const [opacity, setOpacity] = useState(1);

  const move = useCallback((dir) => {
    setOpacity(0);
    setTimeout(() => {
      setIndex(i => (i + dir + photos.length) % photos.length);
      setOpacity(1);
    }, 120);
  }, [photos.length]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === "ArrowRight") move(1);
      if (e.key === "ArrowLeft") move(-1);
      if (e.key === "Escape") onClose();
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [move, onClose]);

  const src = photos[index].src.replace(/w=\d+/, "w=1200");

  return (
    <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/90" onClick={onClose}>
      <button onClick={onClose} className="absolute top-5 right-5 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors z-10">
        <span className="material-symbols-outlined text-white text-[22px]">close</span>
      </button>
      {photos.length > 1 && (
        <button onClick={e => { e.stopPropagation(); move(-1); }}
                className="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/25 flex items-center justify-center transition-colors z-10">
          <span className="material-symbols-outlined text-white text-[28px]">chevron_left</span>
        </button>
      )}
      <img src={src} alt={photos[index].alt} onClick={e => e.stopPropagation()}
           style={{ opacity, transition: "opacity 0.15s ease" }}
           className="max-h-[85vh] max-w-[85vw] rounded-2xl shadow-2xl object-contain select-none" />
      {photos.length > 1 && (
        <button onClick={e => { e.stopPropagation(); move(1); }}
                className="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/25 flex items-center justify-center transition-colors z-10">
          <span className="material-symbols-outlined text-white text-[28px]">chevron_right</span>
        </button>
      )}
      {photos.length > 1 && (
        <div className="absolute bottom-5 left-1/2 -translate-x-1/2 text-white/70 text-sm font-bold bg-black/40 px-4 py-1.5 rounded-full">
          {index + 1} / {photos.length}
        </div>
      )}
    </div>
  );
}
</script>

<script type="text/babel">
// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({ visible }) {
  return (
    <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-[60] flex items-center gap-3 bg-inverse-surface text-inverse-on-surface px-6 py-3.5 rounded-2xl shadow-2xl text-sm font-bold transition-all duration-300 ${visible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-4 pointer-events-none"}`}>
      <span className="material-symbols-outlined icon-fill text-green-400 text-[20px]">check_circle</span>
      Review updated successfully!
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [reviews, setReviews] = useState(INITIAL_REVIEWS);
  const [allShown, setAllShown] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [showFilter, setShowFilter] = useState(false);
  const [sortMode, setSortMode] = useState("recent");
  const [ratingFilter, setRatingFilter] = useState(0);
  const [activeFilters, setActiveFilters] = useState({ sort: "recent", rating: 0 });
  const [editReview, setEditReview] = useState(null);
  const [lightbox, setLightbox] = useState(null); // { photos, index }
  const [toast, setToast] = useState(false);

  // Compute visible reviews
  const visibleReviews = (() => {
    let list = reviews.filter(r => {
      if (searchQuery) return r.hotel.toLowerCase().includes(searchQuery.toLowerCase());
      if (!allShown && !searchQuery && activeFilters.sort === "recent" && activeFilters.rating === 0) {
        return !r.initiallyHidden;
      }
      return true;
    });

    // Apply rating filter
    if (activeFilters.rating > 0) list = list.filter(r => r.rating === activeFilters.rating);
    if (activeFilters.sort === "photos") list = list.filter(r => r.photos.length > 0);

    // Sort
    if (activeFilters.sort === "recent") list = [...list].sort((a, b) => b.date.localeCompare(a.date));
    else if (activeFilters.sort === "rating") list = [...list].sort((a, b) => b.rating - a.rating);

    return list;
  })();

  const totalCount = reviews.length;
  const shownCount = visibleReviews.length;

  const avgRating = reviews.length
    ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1)
    : "0.0";

  const isFiltered = activeFilters.rating > 0 || activeFilters.sort === "photos" || searchQuery;

  function handleDelete(id) {
    if (!window.confirm("Delete this review?")) return;
    setReviews(prev => prev.filter(r => r.id !== id));
  }

  function handleSave(text, rating) {
    setReviews(prev => prev.map(r => r.id === editReview.id ? { ...r, text, rating } : r));
    setEditReview(null);
    setToast(true);
    setTimeout(() => setToast(false), 2800);
  }

  function applyFilters() {
    setActiveFilters({ sort: sortMode, rating: ratingFilter });
    setAllShown(true);
    setShowFilter(false);
  }

  function toggleShowAll() {
    setAllShown(prev => !prev);
    setActiveFilters({ sort: "recent", rating: 0 });
    setSortMode("recent");
    setRatingFilter(0);
  }

  function handleSearch(val) {
    setSearchQuery(val);
    if (val) setAllShown(true);
  }

  // Keyboard: close modals
  useEffect(() => {
    const handler = (e) => {
      if (e.key === "Escape") {
        setEditReview(null);
        setLightbox(null);
        setShowFilter(false);
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  function renderCard(review) {
    const props = {
      key: review.id,
      review,
      onEdit: () => setEditReview(review),
      onDelete: () => handleDelete(review.id),
      onLightbox: (photos, idx) => setLightbox({ photos, index: idx }),
    };
    if (review.layout === "side-photos") return <CardSidePhotos {...props} />;
    if (review.layout === "inline-photo") return <CardInlinePhoto {...props} />;
    return <CardTextOnly {...props} />;
  }

  return (
    <>
      <div className="flex min-h-screen">
        {/* SIDEBAR */}
        <aside className="fixed left-0 top-0 bottom-0 w-[260px] bg-white border-r border-gray-100 flex flex-col z-40">

          {/* Logo */}
          <div className="px-7 pt-8 pb-6">
            <span className="font-headline text-[22px] font-black text-primary tracking-tight">Booking4LU</span>
          </div>

          {/* Divider */}
          <div className="mx-5 border-t border-gray-200"></div>

          {/* User Profile */}
          <div className="px-5 pt-5 pb-5">
            <div className="flex items-center gap-3">
              <div className="w-[42px] h-[42px] rounded-full bg-primary flex items-center justify-center flex-shrink-0">
                <span className="font-headline font-black text-white text-[17px]">A</span>
              </div>
              <div>
                <p className="font-headline font-bold text-[14px] text-primary leading-snug">Alexander Sterling</p>
                <p className="text-[12px] text-gray-400 mt-0.5">Azure Prestige Member</p>
              </div>
            </div>
          </div>

          {/* Divider */}
          <div className="mx-5 border-t border-gray-200"></div>

          {/* Book New Stay */}
          <div className="px-5 pt-5 pb-2">
            <a href="homepage-react.html" className="block w-full py-[13px] rounded-[14px] bg-primary text-white font-headline font-bold text-[14px] hover:bg-primary-container active:scale-95 transition-all text-center">
              Book New Stay
            </a>
          </div>

          {/* Nav */}
          <nav className="flex-1 pt-3 pb-2 flex flex-col px-3">
            <a href="account-mystay-react.html" className="flex items-center gap-3.5 px-4 py-[14px] rounded-xl text-gray-500 hover:bg-[#EEF2FF] hover:text-primary transition-all text-[15px] font-medium">
              <span className="material-symbols-outlined icon-fill text-[24px]" style={{color:'#4a5e8a'}}>king_bed</span>
              My Stays
            </a>
            <a href="account-savedlist-react.html" className="flex items-center gap-3.5 px-4 py-[14px] rounded-xl text-gray-500 hover:bg-[#EEF2FF] hover:text-primary transition-all text-[15px] font-medium">
              <span className="material-symbols-outlined icon-fill text-[24px]" style={{color:'#4a5e8a'}}>bookmark</span>
              Saved Lists
            </a>
            <a href="account-review-react.html" className="flex items-center gap-3.5 px-4 py-[14px] rounded-xl bg-[#EEF2FF] text-primary font-bold text-[15px]">
              <span className="material-symbols-outlined icon-fill text-[24px] text-primary">rate_review</span>
              Reviews
            </a>
            <a href="account-friend-react.html" className="flex items-center gap-3.5 px-4 py-[14px] rounded-xl text-gray-500 hover:bg-[#EEF2FF] hover:text-primary transition-all text-[15px] font-medium">
              <span className="material-symbols-outlined icon-fill text-[24px]" style={{color:'#4a5e8a'}}>group</span>
              Friends
            </a>
          </nav>

          {/* Bottom */}
          <div className="border-t border-gray-100 px-3 py-4 flex flex-col">
            <a href="#" className="flex items-center gap-3.5 px-4 py-[13px] rounded-xl text-gray-500 hover:bg-blue-50 hover:text-primary transition-all text-[14px]">
              <span className="material-symbols-outlined text-[22px]">help_outline</span>
              Help Center
            </a>
            <a href="login-react.html" className="flex items-center gap-3.5 px-4 py-[13px] rounded-xl text-gray-500 hover:bg-red-50 hover:text-red-600 transition-all text-[14px]">
              <span className="material-symbols-outlined text-[22px]">logout</span>
              Logout
            </a>
          </div>
        </aside>

        {/* MAIN */}
        <main className="ml-[260px] flex-1 px-10 py-10 bg-background min-h-screen">
          <div className="max-w-5xl mx-auto">

            {/* Page Header */}
            <div className="flex items-end justify-between mb-10">
              <div>
                <h1 className="font-headline text-4xl font-extrabold text-primary tracking-tight mb-2">Your Reviews</h1>
                <p className="text-on-surface-variant text-sm font-medium">Manage and share your travel experiences with the Booking4LU community.</p>
              </div>
              <div className="flex items-center gap-3">
                <div className="flex items-center gap-2 px-5 py-2.5 h-[42px] rounded-full border border-outline-variant bg-white shadow-sm">
                  <span className="material-symbols-outlined text-on-surface-variant text-[18px]">search</span>
                  <input type="text" placeholder="Search reviews..." value={searchQuery}
                         onChange={e => handleSearch(e.target.value)}
                         className="text-sm font-bold text-on-surface placeholder:text-outline bg-transparent outline-none w-32" />
                </div>
                <button onClick={() => setShowFilter(true)}
                        className="flex items-center gap-2 px-5 py-2.5 h-[42px] rounded-full border border-outline-variant bg-white text-primary font-bold text-sm hover:bg-surface-container-low transition-colors shadow-sm">
                  <span className="material-symbols-outlined text-[18px]">tune</span>Filter
                </button>
                <div className="flex items-center gap-3 bg-amber-50 border border-amber-200 rounded-2xl px-5 py-3">
                  <span className="material-symbols-outlined icon-fill text-amber-500 text-3xl">star</span>
                  <div>
                    <p className="font-headline font-black text-2xl text-amber-700 leading-none">{avgRating}</p>
                    <p className="text-[10px] font-bold uppercase tracking-widest text-amber-600 mt-0.5">Avg. Rating</p>
                  </div>
                </div>
              </div>
            </div>

            {/* Review List */}
            <div className="space-y-6">
              {visibleReviews.map(r => renderCard(r))}
              {visibleReviews.length === 0 && (
                <div className="text-center py-16 text-on-surface-variant font-medium">No reviews found.</div>
              )}
            </div>

            {/* Pagination */}
            {!isFiltered && (
              <div className="mt-12 flex flex-col items-center gap-4">
                <button onClick={toggleShowAll}
                        className="flex items-center gap-2 px-10 py-3 rounded-full border-2 border-primary text-primary font-headline font-bold text-sm hover:bg-primary hover:text-white transition-all active:scale-95 shadow-sm">
                  <span className="material-symbols-outlined text-[18px]">{allShown ? "expand_less" : "expand_more"}</span>
                  {allShown ? "Show Less" : `Show All ${totalCount} Reviews`}
                </button>
                <p className="text-xs text-on-surface-variant font-medium">
                  {allShown ? `Showing all ${totalCount} reviews` : `Showing ${shownCount} of ${totalCount} reviews`}
                </p>
              </div>
            )}
            {isFiltered && (
              <p className="mt-8 text-center text-xs text-on-surface-variant font-medium">
                {searchQuery
                  ? `Found ${shownCount} of ${totalCount} reviews`
                  : `Showing ${shownCount} of ${totalCount} reviews`}
              </p>
            )}
          </div>
        </main>
      </div>

      {/* Modals */}
      {showFilter && (
        <FilterModal
          onClose={() => setShowFilter(false)}
          onApply={applyFilters}
          sortMode={sortMode} setSortMode={setSortMode}
          ratingFilter={ratingFilter} setRatingFilter={setRatingFilter}
        />
      )}
      {editReview && (
        <EditModal review={editReview} onClose={() => setEditReview(null)} onSave={handleSave} />
      )}
      {lightbox && (
        <Lightbox photos={lightbox.photos} startIndex={lightbox.index} onClose={() => setLightbox(null)} />
      )}
      <Toast visible={toast} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
