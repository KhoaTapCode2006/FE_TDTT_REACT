  <script type="text/babel">

    // ── Icon helper ──────────────────────────────────────────────────────────

        : { fontSize: size };
      return <span className={`material-symbols-outlined ${className}`} style={style}>{name}</span>;
    }

    // ── FriendCard ───────────────────────────────────────────────────────────
    function FriendCard({ friend, delay, onViewProfile }) {
      return (
        <div
          className="friend-card group flex items-center p-4 bg-surface-bright rounded-2xl transition-all duration-200 hover:bg-white hover:shadow-md cursor-default fade-in"
          style={{ animationDelay: `${delay * 0.06}s` }}
        >
          <div
            className="w-14 h-14 rounded-2xl overflow-hidden mr-4 flex-shrink-0 flex items-center justify-center text-lg font-bold font-headline"
            style={{ background: friend.color, color: friend.textColor }}
          >
            {friend.initials}
          </div>
          <div className="flex-1 min-w-0">
            <h4 className="font-headline font-bold text-blue-900 group-hover:text-primary transition-colors text-sm truncate">{friend.name}</h4>
            <div className="flex items-center text-slate-500 text-xs mt-0.5">
              <Icon name="location_on" size={14} className="mr-1" />
              <span className="truncate">{friend.location}</span>
            </div>
            <span
              className="inline-block mt-1 text-[10px] font-semibold px-2 py-0.5 rounded-full"
              style={{ background: friend.color, color: friend.textColor }}
            >{friend.badge}</span>
          </div>
          <button
            className="view-btn ml-2 px-3 py-1.5 bg-white text-primary border border-primary/20 hover:border-primary rounded-xl text-xs font-bold transition-all hover:shadow-sm active:scale-95 flex-shrink-0"
            onClick={() => onViewProfile(friend)}
          >
            View Profile
          </button>
        </div>
      );
    }

    // ── FriendsPanel ─────────────────────────────────────────────────────────
    function FriendsPanel({ onViewProfile }) {
      const [tab, setTab] = useState("mutuals");
      const [search, setSearch] = useState("");
      const [visible, setVisible] = useState(6);

      const data = tab === "mutuals" ? window.FRIENDS_DATA : window.SUGGESTED_DATA;
      const filtered = data.filter(f => f.name.toLowerCase().includes(search.toLowerCase()));
      const shown = filtered.slice(0, visible);
      const hasMore = visible < filtered.length;
      const hasLess = visible > 6;

      function switchTab(t) {
        setTab(t);
        setSearch("");
        setVisible(6);
      }

      return (
        <div className="lg:w-2/3 bg-white p-6 md:p-8 rounded-3xl shadow-[0_12px_32px_rgba(0,52,111,0.04)] fade-in fade-in-delay-1">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <h3 className="text-xl font-headline font-bold text-blue-900">Your Circle</h3>
            <div className="flex items-center gap-3 flex-wrap">
              <div className="hidden md:flex items-center bg-surface-container-low border border-outline-variant/50 px-3 py-1.5 rounded-full gap-2">
                <Icon name="search" className="text-slate-500" size={16} />
                <input
                  type="text"
                  placeholder="Search friends..."
                  value={search}
                  onChange={e => { setSearch(e.target.value); setVisible(6); }}
                  className="bg-transparent border-none focus:ring-0 text-xs w-32 outline-none text-on-surface-variant"
                />
              </div>
              <span
                onClick={() => switchTab("mutuals")}
                className={`px-3 py-1 text-xs font-semibold rounded-full cursor-pointer transition-all duration-200 select-none ${tab === "mutuals" ? "bg-primary text-white" : "bg-surface-container-low text-slate-500 hover:bg-slate-200"}`}
              >Mutuals</span>
              <span
                onClick={() => switchTab("suggested")}
                className={`px-3 py-1 text-xs font-semibold rounded-full cursor-pointer transition-all duration-200 select-none ${tab === "suggested" ? "bg-primary text-white" : "bg-surface-container-low text-slate-500 hover:bg-slate-200"}`}
              >Suggested</span>
            </div>
          </div>

          {shown.length === 0 ? (
            <p className="text-center text-slate-500 text-sm py-8">No friends match your search.</p>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              {shown.map((f, i) => (
                <FriendCard key={f.id} friend={f} delay={i} onViewProfile={onViewProfile} />
              ))}
            </div>
          )}

          {hasMore && (
            <button
              onClick={() => setVisible(v => v + PAGE_SIZE)}
              className="w-full mt-6 py-3 text-blue-900 font-headline font-bold text-sm border-t border-slate-100 hover:bg-slate-50 transition-colors rounded-b-2xl"
            >Show More Connections</button>
          )}
          {!hasMore && hasLess && (
            <button
              onClick={() => setVisible(6)}
              className="w-full mt-6 py-3 text-blue-900 font-headline font-bold text-sm border-t border-slate-100 hover:bg-slate-50 transition-colors rounded-b-2xl"
            >Show Less</button>
          )}
        </div>
      );
    }

    // ── NetworkStats ─────────────────────────────────────────────────────────
    function NetworkStats() {
      return (
        <div className="bg-gradient-to-br from-tertiary to-tertiary-container p-7 rounded-3xl text-white shadow-xl fade-in fade-in-delay-2">
          <h3 className="font-headline font-bold text-xl mb-6">Network Insights</h3>
          <div className="space-y-5">
            {window.STATS_DATA.map(stat => (
              <div key={stat.label} className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center flex-shrink-0">
                    <Icon name={stat.icon} className="text-tertiary-fixed-dim" size={22} />
                  </div>
                  <span className="stat-label font-body text-sm text-white/80">{stat.label}</span>
                </div>
                <span className="font-headline font-extrabold text-2xl">{stat.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── InviteCard ───────────────────────────────────────────────────────────
    function InviteCard() {
      const [email, setEmail] = useState("");
      const [sent, setSent] = useState(false);
      const [error, setError] = useState(false);

      function handleSend() {
        if (!email || !email.includes("@")) {
          setError(true);
          setTimeout(() => setError(false), 1500);
          return;
        }
        setSent(true);
        setEmail("");
        setTimeout(() => setSent(false), 3000);
      }

      return (
        <div className="bg-secondary-container p-7 rounded-3xl relative overflow-hidden group fade-in fade-in-delay-3">
          <div className="relative z-10">
            <h3 className="font-headline font-extrabold text-on-secondary-fixed text-xl leading-tight">
              Invite more<br />connoisseurs
            </h3>
            <p className="text-on-secondary-fixed-variant text-sm mt-2 mb-5">
              Grow your network and earn Prestige Points for every successful referral.
            </p>
            <div className="flex gap-2">
              <input
                type="email"
                placeholder="friend@email.com"
                value={email}
                onChange={e => setEmail(e.target.value)}
                className={`flex-1 text-xs px-3 py-2 rounded-full border bg-white/60 focus:outline-none focus:ring-2 focus:ring-secondary/40 ${error ? "border-red-400" : "border-secondary/30"}`}
              />
              <button
                onClick={handleSend}
                className="bg-secondary text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg shadow-secondary/30 hover:scale-105 transition-transform active:scale-95 whitespace-nowrap"
              >Send Invite</button>
            </div>
            {sent && (
              <p className="text-xs text-green-700 font-semibold mt-2 flex items-center gap-1">
                <Icon name="check_circle" size={14} /> Invite sent successfully!
              </p>
            )}
          </div>
          <Icon name="mail" size={96} className="absolute -bottom-4 -right-4 text-on-secondary-fixed/5 rotate-12 group-hover:scale-110 transition-transform duration-500" />
        </div>
      );
    }

    // ── DestinationCard ──────────────────────────────────────────────────────
    function DestinationCard({ dest }) {
      const [faved, setFaved] = useState(false);
      return (
        <div className={`group relative h-56 rounded-3xl overflow-hidden cursor-pointer ${dest.wide ? "md:col-span-2" : ""}`}>
          <img
            src={dest.img}
            alt={dest.title}
            className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
          />
          <div className={`absolute inset-0 bg-gradient-to-t ${dest.gradient} via-transparent to-transparent`} />
          <div className="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors duration-300" />
          <div className="absolute bottom-5 left-5 right-5 flex items-end justify-between">
            <div>
              <span className="bg-secondary text-white text-[10px] px-2 py-0.5 rounded-full font-bold uppercase mb-2 inline-block tracking-wide">
                {dest.subtitle}
              </span>
              <h4 className={`text-white font-headline font-bold ${dest.wide ? "text-2xl" : "text-xl"} leading-tight`}>{dest.title}</h4>
              <span className="text-white/70 text-xs mt-1 inline-block">{dest.tag}</span>
            </div>
            <button
              onClick={() => setFaved(v => !v)}
              className="bg-white/20 backdrop-blur-md p-2 rounded-full text-white hover:bg-white/30 transition-colors active:scale-95 flex-shrink-0"
            >
              <Icon
                name="favorite"
                size={18}
                filled={faved}
                className={faved ? "text-red-400" : "text-white"}
              />
            </button>
          </div>
        </div>
      );
    }

    // ── ProfileModal ─────────────────────────────────────────────────────────
    function ProfileModal({ friend, onClose }) {
      const [followed, setFollowed] = useState(false);

      useEffect(() => {
        setFollowed(false);
        function onKey(e) { if (e.key === "Escape") onClose(); }
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [friend]);

      if (!friend) return null;

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
          onClick={e => e.target === e.currentTarget && onClose()}
        >
          <div className="modal-box bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 relative">
            <button onClick={onClose} className="absolute top-4 right-4 p-1.5 hover:bg-slate-100 rounded-full transition-colors">
              <Icon name="close" className="text-slate-500" size={20} />
            </button>
            <div className="flex flex-col items-center text-center">
              <div
                className="w-20 h-20 rounded-2xl overflow-hidden mb-4 flex items-center justify-center text-3xl font-bold font-headline"
                style={{ background: friend.color, color: friend.textColor }}
              >{friend.initials}</div>
              <h3 className="text-xl font-headline font-bold text-blue-900 mb-1">{friend.name}</h3>
              <p className="text-sm text-slate-500 flex items-center gap-1 mb-3">
                <Icon name="location_on" size={14} />{friend.location}
              </p>
              <div className="flex gap-3 mb-5">
                <span className="px-3 py-1 bg-surface-container-low rounded-full text-xs font-semibold text-primary">{friend.trips}</span>
                <span className="px-3 py-1 bg-secondary-container rounded-full text-xs font-semibold text-secondary">{friend.badge}</span>
              </div>
              <p className="text-sm text-slate-600 mb-6 leading-relaxed">{friend.bio}</p>
              <div className="flex gap-3 w-full">
                <button
                  onClick={() => setFollowed(v => !v)}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-colors ${
                    followed
                      ? "bg-slate-100 text-slate-500 border border-slate-200 hover:bg-red-50 hover:text-red-500 hover:border-red-200"
                      : "bg-primary text-white hover:bg-primary-container"
                  }`}
                >{followed ? "Followed" : "Follow"}</button>
                <button
                  onClick={onClose}
                  className="flex-1 py-2.5 border border-outline-variant text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-50 transition-colors"
                >Close</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem("theme") === "dark");
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [modalFriend, setModalFriend] = useState(null);
      const [mobileSearch, setMobileSearch] = useState("");

      useEffect(() => {
        const html = document.documentElement;
        if (darkMode) {
          html.classList.replace("light", "dark");
          localStorage.setItem("theme", "dark");
        } else {
          html.classList.replace("dark", "light");
          localStorage.setItem("theme", "light");
        }
      }, [darkMode]);

      return (
        <>
          <Sidebar open={sidebarOpen} onClose={() => setSidebarOpen(false)} />

          <main className="md:ml-64 pt-8 px-4 md:px-8 pb-12 w-full transition-all duration-300">
            {/* Hero Banner */}
            <section className="mb-10 relative rounded-3xl overflow-hidden h-44 md:h-52 flex items-center px-8 md:px-12 fade-in">
              <div className="absolute inset-0 z-0">
                <img
                  src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1400&auto=format&fit=crop&q=80"
                  alt="Airplane flying in sky"
                  className="w-full h-full object-cover"
                />
                <div className="absolute inset-0 bg-black/30" />
                <div className="absolute inset-0 bg-gradient-to-r from-primary/80 via-primary/50 to-transparent" />
              </div>
              <div className="relative z-10">
                <h1 className="text-3xl md:text-4xl font-headline font-extrabold text-white tracking-tight drop-shadow-md">Travel Network</h1>
                <p className="text-blue-100 mt-2 font-body text-sm md:text-base max-w-lg drop-shadow">
                  Connect with fellow Azure Prestige members and share your curated travel itineraries.
                </p>
              </div>
            </section>

            {/* Mobile search */}
            <div className="flex md:hidden items-center bg-white border border-outline-variant px-4 py-2.5 rounded-2xl mb-6 shadow-sm">
              <Icon name="search" className="text-slate-500 mr-2" size={18} />
              <input
                type="text"
                placeholder="Search friends by name..."
                value={mobileSearch}
                onChange={e => setMobileSearch(e.target.value)}
                className="bg-transparent border-none focus:ring-0 text-sm flex-1 outline-none text-on-surface-variant"
              />
            </div>

            {/* Main grid */}
            <div className="flex flex-col lg:flex-row gap-8 mb-10">
              <FriendsPanel onViewProfile={setModalFriend} />
              <div className="lg:w-1/3 flex flex-col gap-6">
                <NetworkStats />
                <InviteCard />
              </div>
            </div>

            {/* Recent Destinations */}
            <section className="fade-in fade-in-delay-4">
              <div className="flex items-baseline justify-between mb-6 px-1">
                <h2 className="text-xl md:text-2xl font-headline font-extrabold text-blue-900 tracking-tight">Recent Friend Destinations</h2>
                <a href="#" className="text-sm font-bold text-secondary flex items-center hover:underline">
                  Explore feed <Icon name="arrow_forward" size={16} className="ml-1" />
                </a>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                {window.DESTINATIONS_DATA.map((dest, i) => (
                  <DestinationCard key={i} dest={dest} />
                ))}
              </div>
            </section>
          </main>

          {modalFriend && <ProfileModal friend={modalFriend} onClose={() => setModalFriend(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
